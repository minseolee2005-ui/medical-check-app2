<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>의료 자가 체크</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    body { font-family: sans-serif; padding:20px; }
    .emergency { background-color: red; color:white; }
    button { margin-top:10px; padding:10px; }
  </style>
</head>

<body>

<h2>🩺 증상 체크</h2>

<label><input type="checkbox" id="fever"> 발열</label><br>
<label><input type="checkbox" id="vomit"> 구토</label><br>
<label><input type="checkbox" id="cough"> 기침</label><br>

<button onclick="analyze()">분석</button>
<button onclick="findHospital()">🏥 병원 찾기</button>

<p id="result"></p>

<button id="emergencyBtn" style="display:none;" onclick="call119()">🚨 119</button>

<p style="color:gray;">
※ 본 앱은 참고용이며 정확한 진단은 의료진 상담이 필요합니다.
</p>

<script>
function analyze(){
  let symptoms = [];

  if(fever.checked) symptoms.push("발열");
  if(vomit.checked) symptoms.push("구토");
  if(cough.checked) symptoms.push("기침");

  let summary = "환자는 " + symptoms.join(", ") + " 증상을 보입니다.";

  let diagnosis = "";
  if(fever.checked && cough.checked){
    diagnosis = "호흡기 감염 의심";
  } else if(fever.checked && vomit.checked){
    diagnosis = "위장염 의심";
  } else {
    diagnosis = "추가 진료 필요";
  }

  let resultHTML = `
    <h3>📄 진료 요약</h3>
    ${summary}

    <h3>🧠 의심 질환</h3>
    ${diagnosis}

    <h3>❓ 질문</h3>
    <ul>
      <li>이 증상의 원인은 무엇인가요?</li>
      <li>검사가 필요할까요?</li>
      <li>약은 어떻게 복용하나요?</li>
    </ul>
  `;

  document.getElementById("result").innerHTML = resultHTML;

  if(fever.checked && vomit.checked){
    document.body.classList.add("emergency");
    document.getElementById("emergencyBtn").style.display = "block";
  }
}

function findHospital(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;
    window.open(`https://www.google.com/maps/search/병원/@${lat},${lon},15z`);
  });
}

function call119(){
  location.href = "tel:119";
}
</script>

</body>
</html>
