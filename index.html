<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>의료 자가 체크 앱</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <style>
    body { font-family: sans-serif; padding:20px; }
    h3 { margin-top:20px; }
    button { margin-top:10px; padding:10px; width:100%; }
    .emergency { background-color: red; color:white; }
  </style>
</head>

<body>

<h2>🩺 증상 체크</h2>

<h3>🤒 전신 증상</h3>
<label><input type="checkbox" id="fever"> 발열</label><br>
<label><input type="checkbox" id="chill"> 오한</label><br>
<label><input type="checkbox" id="fatigue"> 피로감</label><br>

<h3>🤧 호흡기</h3>
<label><input type="checkbox" id="cough"> 기침</label><br>
<label><input type="checkbox" id="soreThroat"> 목 아픔</label><br>
<label><input type="checkbox" id="runnyNose"> 콧물</label><br>

<h3>🤢 소화기</h3>
<label><input type="checkbox" id="vomit"> 구토</label><br>
<label><input type="checkbox" id="diarrhea"> 설사</label><br>
<label><input type="checkbox" id="stomachPain"> 복통</label><br>

<h3>⚠️ 기타</h3>
<label><input type="checkbox" id="allergy"> 알레르기 반응</label><br>
<label><input type="checkbox" id="chestPain"> 흉통</label><br>

<button onclick="analyze()">📊 분석하기</button>
<button onclick="findHospital()">🏥 근처 병원 찾기</button>

<div id="result"></div>

<button id="emergencyBtn" style="display:none;" onclick="call119()">🚨 119 전화</button>

<p style="color:gray;">
※ 본 앱은 참고용이며 정확한 진단은 의료진 상담이 필요합니다.
</p>

<script>
// 분석 함수
function analyze(){
  let symptoms = [];

  if(fever.checked) symptoms.push("발열");
  if(chill.checked) symptoms.push("오한");
  if(fatigue.checked) symptoms.push("피로감");

  if(cough.checked) symptoms.push("기침");
  if(soreThroat.checked) symptoms.push("목 아픔");
  if(runnyNose.checked) symptoms.push("콧물");

  if(vomit.checked) symptoms.push("구토");
  if(diarrhea.checked) symptoms.push("설사");
  if(stomachPain.checked) symptoms.push("복통");

  if(allergy.checked) symptoms.push("알레르기 반응");
  if(chestPain.checked) symptoms.push("흉통");

  // 요약
  let summary = "환자는 " + (symptoms.length ? symptoms.join(", ") : "특이 증상 없음") + " 증상을 보입니다.";

  // 질환 추정
  let diagnosis = "";
  if((fever.checked && cough.checked) || (runnyNose.checked && soreThroat.checked)){
    diagnosis = "감기 또는 독감과 같은 호흡기 질환이 의심됩니다.";
  } else if(vomit.checked && diarrhea.checked){
    diagnosis = "위장염 가능성이 있습니다.";
  } else if(chestPain.checked){
    diagnosis = "심혈관 관련 문제 가능성 → 즉시 진료 권장";
  } else if(allergy.checked){
    diagnosis = "알레르기 반응 가능성";
  } else {
    diagnosis = "명확한 판단이 어려우므로 진료가 필요합니다.";
  }

  // 질문 추천
  let questions = [
    "이 증상의 원인은 무엇인가요?",
    "추가 검사가 필요할까요?",
    "약은 어떻게 복용하나요?",
    "생활에서 주의할 점은 무엇인가요?"
  ];

  // 결과 출력
  let resultHTML = `
    <h3>📄 진료 요약</h3>
    <p>${summary}</p>

    <h3>🧠 의심 질환</h3>
    <p>${diagnosis}</p>

    <h3>❓ 의사에게 물어볼 질문</h3>
    <ul>
      ${questions.map(q => `<li>${q}</li>`).join("")}
    </ul>
  `;

  document.getElementById("result").innerHTML = resultHTML;

  // 응급 상황
  if((fever.checked && vomit.checked) || chestPain.checked){
    document.body.classList.add("emergency");
    document.getElementById("emergencyBtn").style.display = "block";
  }
}

// 병원 찾기
function findHospital(){
  navigator.geolocation.getCurrentPosition(pos=>{
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;
    window.open(`https://www.google.com/maps/search/병원/@${lat},${lon},15z`);
  });
}

// 119 전화
function call119(){
  location.href = "tel:119";
}

// PWA 설정
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
